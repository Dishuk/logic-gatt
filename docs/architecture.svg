<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 505">
  <defs>
    <style>
      .title { font: 600 18px system-ui, sans-serif; fill: #1e293b; }
      .subtitle { font: 400 11px system-ui, sans-serif; fill: #64748b; }
      .box-label { font: 600 12px system-ui, sans-serif; fill: #fff; }
      .box-sub { font: 400 10px system-ui, sans-serif; fill: rgba(255,255,255,0.85); }
      .flow-label { font: 500 9px system-ui, sans-serif; fill: #94a3b8; }
      .section-label { font: 600 12px system-ui, sans-serif; fill: #8b5cf6; }
      .plugin-name { font: 600 10px system-ui, sans-serif; fill: #fff; }
      .plugin-sub { font: 400 9px system-ui, sans-serif; fill: rgba(255,255,255,0.8); }
      .custom-name { font: 600 10px system-ui, sans-serif; fill: #94a3b8; }
      .footer { font: 400 10px system-ui, sans-serif; fill: #64748b; }
    </style>
    <marker id="arrow" markerWidth="6" markerHeight="5" refX="2.5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#cbd5e1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="400" height="520" fill="#fff"/>

  <!-- Title -->
  <text x="200" y="35" text-anchor="middle" class="title">LogicGATT Architecture</text>
  <text x="200" y="52" text-anchor="middle" class="custom-name">Plugin-based BLE device emulator</text>

  <!-- ════════════════ VERTICAL FLOW ════════════════ -->

  <!-- Frontend -->
  <g transform="translate(125, 75)">
    <rect width="150" height="55" rx="8" fill="#3b82f6"/>
    <text x="75" y="24" text-anchor="middle" class="box-label">Frontend</text>
    <text x="75" y="40" text-anchor="middle" class="box-sub">React UI / Schema Editor</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="200" y1="130" x2="200" y2="160" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="220" y="150" class="flow-label">WebSocket</text>

  <!-- Backend -->
  <g transform="translate(125, 165)">
    <rect width="150" height="55" rx="8" fill="#10b981"/>
    <text x="75" y="24" text-anchor="middle" class="box-label">Backend</text>
    <text x="75" y="40" text-anchor="middle" class="box-sub">Node.js / Plugin Manager</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="200" y1="220" x2="200" y2="250" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="220" y="240" class="flow-label">Unified API</text>

  <!-- Plugin Container -->
  <g transform="translate(50, 255)">
    <rect width="300" height="105" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="150" y="20" text-anchor="middle" class="section-label">Swappable Plugin</text>

    <!-- Plugin cards inside -->
    <!-- ble-uart -->
    <g transform="translate(15, 32)">
      <rect width="82" height="38" rx="5" fill="#8b5cf6"/>
      <text x="41" y="18" text-anchor="middle" class="plugin-name">ble-uart</text>
      <text x="41" y="30" text-anchor="middle" class="plugin-sub">Serial to MCU</text>
    </g>

    <!-- usb-ble -->
    <g transform="translate(109, 32)">
      <rect width="82" height="38" rx="5" fill="#8b5cf6"/>
      <text x="41" y="18" text-anchor="middle" class="plugin-name">usb-ble</text>
      <text x="41" y="30" text-anchor="middle" class="plugin-sub">USB Adapter</text>
    </g>

    <!-- Custom -->
    <g transform="translate(203, 32)">
      <rect width="82" height="38" rx="5" fill="transparent" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="41" y="24" text-anchor="middle" class="custom-name">+ Custom</text>
    </g>

    <!-- "One active" note -->
    <text x="150" y="90" text-anchor="middle" class="custom-name">One plugin active at a time</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="200" y1="360" x2="200" y2="390" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="220" y="380" class="flow-label">I/O</text>

  <!-- BLE Hardware -->
  <g transform="translate(125, 395)">
    <rect width="150" height="55" rx="8" fill="#f97316"/>
    <text x="75" y="24" text-anchor="middle" class="box-label">BLE Hardware</text>
    <text x="75" y="40" text-anchor="middle" class="box-sub">Radio / GATT Server</text>
  </g>

  <!-- ════════════════ FOOTER ════════════════ -->

  <text x="200" y="485" text-anchor="middle" class="custom-name">Same frontend and backend work with any plugin.</text>

</svg>